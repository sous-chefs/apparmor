---
name: ci

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  lint-unit:
    uses: sous-chefs/.github/.github/workflows/lint-unit.yml@5.1.0
    permissions:
      actions: write
      checks: write
      pull-requests: write
      statuses: write
      issues: write
    secrets: inherit

  integration-dokken:
    needs: lint-unit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - debian-12
          - debian-13
          - ubuntu-2204
          - ubuntu-2404
        suite:
          - disable
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - name: Install Chef
        uses: actionshub/chef-install@main
      - name: Dokken
        uses: actionshub/test-kitchen@main
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
        with:
          suite: ${{ matrix.suite }}
          os: ${{ matrix.os }}
      - name: Print debug output on failure
        if: failure()
        run: |
          set -x
          sudo journalctl -l --since today

  integration-exec:
    needs: lint-unit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite:
          - default
          - policy-add
          - policy-remove
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - name: Install Chef
        uses: actionshub/chef-install@main
      - name: test-kitchen
        uses: actionshub/test-kitchen@main
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_LOCAL_YAML: kitchen.exec.yml
        with:
          suite: ${{ matrix.suite }}
          os: ubuntu-2404
      - name: Print debug output on failure
        if: failure()
        run: |
          set -x
          sudo journalctl -l --since today

  final:
    runs-on: ubuntu-latest
    needs: [integration-dokken, integration-exec]
    steps:
      - run: echo ${{needs.integration-dokken.outputs}} ${{needs.integration-exec.outputs}}
