driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  chef_license: accept-no-persist
  multiple_converge: 2
  enforce_idempotency: true
  deprecations_as_errors: true
  log_level: <%= ENV['CHEF_LOG_LEVEL'] || 'auto' %>
  # Allow reboots
  max_retries: 60
  wait_for_retry: 90
  root_path: /var/tmp/kitchen

verifier:
  name: inspec

platforms:
  - name: debian-12
  - name: ubuntu-22.04
  - name: ubuntu-24.04

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  disable: &disable_run_list
    - recipe[test::disable]
  policy_add: &policy_add_run_list
    - recipe[test::policy_add]
  policy_remove: &policy_remove_run_list
    - recipe[test::policy_remove]

suites:
  - name: default
    run_list: *default_run_list
    verifier:
      inspec_tests:
        - path: test/integration/default

  - name: disable
    run_list: *disable_run_list
    provisioner:
      max_retries: 60
      wait_for_retry: 90
    verifier:
      inspec_tests:
        - path: test/integration/disable

  - name: policy-add
    run_list: *policy_add_run_list
    verifier:
      inspec_tests:
        - path: test/integration/policy-add

  - name: policy-remove
    run_list: *policy_remove_run_list
    provisioner:
      multiple_converge: 1
      enforce_idempotency: false
    verifier:
      inspec_tests:
        - path: test/integration/policy-remove
