driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  chef_license: accept-no-persist
  multiple_converge: 2
  enforce_idempotency: true
  deprecations_as_errors: true
  log_level: <%= ENV['CHEF_LOG_LEVEL'] || 'auto' %>
  # Allow reboots
  max_retries: 60
  wait_for_retry: 90
  root_path: /var/tmp/kitchen

verifier:
  name: inspec

platforms:
  - name: debian-12
  - name: debian-13
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    run_list:
      - recipe[test::default]
    # verifier:
    #   inspec_tests:
    #     - path: test/integration/default

  - name: disable
    run_list:
      - recipe[test::disable]
    provisioner:
      max_retries: 60
      wait_for_retry: 90
    # verifier:
    #   inspec_tests:
    #     - path: test/integration/disable

  - name: policy-add
    run_list:
      - recipe[test::policy_add]
    # verifier:
    #   inspec_tests:
    #     - path: test/integration/policy-add

  - name: policy-remove
    run_list:
      - recipe[test::policy_remove]
    provisioner:
      multiple_converge: 1
      enforce_idempotency: false
    # verifier:
    #   inspec_tests:
    #     - path: test/integration/policy-remove
